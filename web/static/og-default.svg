<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="100%" stop-color="#ECE7DC"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.5" fill="#141414" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- paper background + grain -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- accent stripe (top) -->
  <rect x="0" y="0" width="1200" height="6" fill="#7E9A4F"/>
  <!-- accent stripe (bottom-right corner accent) -->
  <rect x="960" y="624" width="240" height="6" fill="#7E9A4F"/>

  <!-- glyph mark (concentric arcs, matches the Nav glyph) -->
  <g transform="translate(80, 90)" stroke="#141414" fill="none">
    <rect x="0" y="0" width="64" height="64" stroke="#141414" stroke-width="2" fill="none"/>
    <g transform="translate(32, 32)">
      <circle r="6" fill="#141414" stroke="none"/>
      <circle r="14" stroke-width="2"/>
      <path d="M -22 0 A 22 22 0 0 1 22 0" stroke-width="2"/>
      <path d="M -16 8 A 16 16 0 0 1 16 8" stroke-width="2"/>
    </g>
  </g>

  <!-- mono brand label -->
  <text x="170" y="132" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="22" letter-spacing="6" fill="#2A2A28">UCFP / v0.4</text>

  <!-- big wordmark -->
  <text x="80" y="380" font-family="Inter Tight, ui-sans-serif, system-ui, sans-serif"
        font-weight="300" font-size="180" letter-spacing="-7" fill="#141414">Universal</text>
  <text x="80" y="500" font-family="Instrument Serif, ui-serif, Georgia, serif"
        font-style="italic" font-weight="400" font-size="180" letter-spacing="-4" fill="#141414">fingerprints.</text>

  <!-- tagline -->
  <text x="80" y="572" font-family="Inter Tight, ui-sans-serif, system-ui, sans-serif"
        font-size="22" fill="#2A2A28">Turn text, images, and audio into compact, comparable digests.</text>

  <!-- modality chips bottom-right -->
  <g font-family="JetBrains Mono, ui-monospace, Menlo, monospace" font-size="14"
     letter-spacing="3" fill="#141414">
    <g transform="translate(900, 90)">
      <rect x="0" y="0" width="80" height="28" stroke="#14141433" fill="none"/>
      <text x="40" y="19" text-anchor="middle">TEXT</text>
    </g>
    <g transform="translate(990, 90)">
      <rect x="0" y="0" width="90" height="28" stroke="#14141433" fill="none"/>
      <text x="45" y="19" text-anchor="middle">IMAGE</text>
    </g>
    <g transform="translate(1090, 90)">
      <rect x="0" y="0" width="90" height="28" stroke="#14141433" fill="none"/>
      <text x="45" y="19" text-anchor="middle">AUDIO</text>
    </g>
  </g>
</svg>
