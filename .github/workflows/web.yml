name: web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

defaults:
  run:
    working-directory: web

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  # NOTE: web deploys are run manually with `wrangler pages deploy`
  # locally; CI only runs check + build for green/red feedback. Re-add
  # a `deploy` job here when CF_API_TOKEN lands as a repo secret.

  migrate:
    name: apply D1 migrations (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && vars.CF_ACCOUNT_ID != ''
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - name: Fail fast when CF_API_TOKEN secret is unset
        if: ${{ env.CF_API_TOKEN == '' }}
        run: |
          echo "::error::CF_API_TOKEN secret not set — required for D1 migrations."
          exit 1
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          workingDirectory: web
          command: d1 migrations apply ucfp_web --remote
