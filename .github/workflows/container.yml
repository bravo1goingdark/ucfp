# Build, push, and deploy the ucfp Rust container image.
#
# Triggers only when the `rust` workflow (tests + lint) completes
# successfully on `main` — guarantees we never push a broken image.
#
# Required repository secrets:
#   GHCR_TOKEN         — GitHub PAT with `write:packages` scope (or use
#                        the auto-generated GITHUB_TOKEN if the repo is
#                        in your personal account — see step below).
#   CF_API_TOKEN       — Cloudflare API token with "Containers:Edit" perm.
#   CF_ACCOUNT_ID      — Cloudflare account ID (visible in CF dashboard).
#
# Optional secrets (enable CF container deploy step):
#   CF_CONTAINER_NAME  — defaults to "ucfp-api" (matches container.toml).

name: container

on:
  workflow_run:
    workflows: [rust]
    branches: [main]
    types: [completed]

# Prevent concurrent deploys; cancel in-flight runs if a new commit lands.
concurrency:
  group: container-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Swap the org/repo path if forked.
  IMAGE_NAME: ${{ github.repository_owner }}/ucfp

jobs:
  push:
    name: push image
    runs-on: ubuntu-latest
    # Only proceed when the upstream rust workflow actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write
      # Needed to add image attestation (optional but recommended).
      id-token: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags:   ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the SHA that the rust workflow tested, not HEAD.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Use the built-in GITHUB_TOKEN; no separate GHCR_TOKEN needed
          # for repos owned by the same account.  For org repos, replace
          # with ${{ secrets.GHCR_TOKEN }}.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Build for amd64 (CF Containers) + arm64 (local dev on Apple silicon).
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # disable SBOM attestation until CF Containers supports it

  deploy:
    name: deploy to cloudflare containers
    runs-on: ubuntu-latest
    needs: push
    # Skip if CF credentials are not configured yet (safe for forks / early dev).
    if: ${{ vars.CF_ACCOUNT_ID != '' && secrets.CF_API_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Update container image tag in CF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.push.outputs.digest }}"
          echo "Deploying image: $IMAGE"
          # Replace the image reference in container.toml and deploy.
          # wrangler container deploy resolves the TOML and pushes the config
          # to the CF API; the container restarts with the new image digest.
          sed -i "s|image = \".*\"|image = \"$IMAGE\"|" container.toml
          wrangler container deploy --config container.toml
